version: '3.8'

services:
  wordpress:
    image: wordpress:latest
    ports:
      - "8080:80"
    environment:
      WORDPRESS_DB_HOST: db
      WORDPRESS_DB_USER: wp_user
      WORDPRESS_DB_PASSWORD: wp_local_dev_2026
      WORDPRESS_DB_NAME: ontariogamers
      WORDPRESS_DEBUG: 1
    volumes:
      - wp_data:/var/www/html
      - ./wp-content/themes/ontariogamers:/var/www/html/wp-content/themes/ontariogamers
      - ./wp-content/plugins/ontariogamers-core:/var/www/html/wp-content/plugins/ontariogamers-core
    depends_on:
      - db
    restart: unless-stopped

  db:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: ontariogamers
      MYSQL_USER: wp_user
      MYSQL_PASSWORD: wp_local_dev_2026
      MYSQL_ROOT_PASSWORD: root_local_dev_2026
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "3306:3306"
    restart: unless-stopped

  # Optional: phpMyAdmin to view your database
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      MYSQL_ROOT_PASSWORD: root_local_dev_2026
    depends_on:
      - db

volumes:
  wp_data:
  db_data:
