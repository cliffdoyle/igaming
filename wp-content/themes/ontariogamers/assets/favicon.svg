    <path d="M32 7 C 41 14, 42 26, 33.5 32.5 L 32 34 L 30.5 32.5 C 22 26, 23 14, 32 7 Z" transform="rotate(240 32 32)"/>
  </g>
  <!-- Golden centre -->
